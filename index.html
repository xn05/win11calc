<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="win11.png">
    <title>Windows 11 Calculator (HTML)</title>
    <style>
        :root {
            --mica-dark: radial-gradient(150% 140% at 18% 18%, #1a242d 0%, #111a22 42%, #0b141c 100%);
            --panel: #202020;
            --panel-top: #202020;
            --border: #ffffff14;
            --btn: #323232;
            --btn-hover: #3C3C3C;
            --btn-active: #323232;
            --btn-operator: #323232;
            --btn-operator-hover: #1f2c36;
            --btn-num: #3B3B3B;
            --btn-num-hover: #323232;
            --btn-num-active: #282828;
            --accent: #4CC2FF;
            --accent-hover: #2387cf;
            --text: #e9edf2;
            --muted: #8d98a4;
            --radius: 12px;
            --radius-sm: 10px;
            --font: "Segoe UI Variable", "Segoe UI", system-ui, -apple-system, sans-serif;
            --shadow: 0 22px 54px rgba(0, 0, 0, 0.58);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--mica-dark);
            font-family: var(--font);
            color: var(--text);
            padding: 28px;
            padding-bottom: 100px;
        }

        .calculator {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 360px;
            height: 670px;
            background: var(--panel);
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            transition: opacity 120ms ease, transform 160ms ease;
        }

        .calculator.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.98);
        }

        .taskbar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 60px;
            background: rgba(25, 25, 32, 0.72);
            backdrop-filter: blur(18px) saturate(140%);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .taskbar-left,
        .taskbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .taskbar-left { justify-content: flex-start; }
        .taskbar-right { justify-content: flex-end; }

        .task-btn {
            height: 42px;
            width: 42px;
            border-radius: 6px;
            border: 0;
            background: transparent;
            color: #e8e8ec;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: background 120ms ease, transform 80ms ease;
            position: relative;
        }

        .task-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .task-btn:active { transform: none; }

        .task-btn.active { background: rgba(255, 255, 255, 0.12); }

        .task-btn.start {
            border-radius: 6px;
            width: 44px;
            height: 44px;
            justify-content: center;
            padding: 0;
        }

        .start-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            display: block;
            border-radius: 2px;
        }

        .task-btn img {
            display: block;
            transform: translateY(-1px);
            transition: transform 80ms ease;
        }

        .task-btn:active img {
            transform: translateY(-1px) scale(0.88);
        }

        .task-btn.running::after {
            content: "";
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 1px;
            width: 6px;
            height: 3px;
            border-radius: 999px;
            background: #9da1a6;
            transition: width 250ms ease;
        }

        .task-btn.active::after {
            width: 16px;
            background: #4cc2ff;
        }

        .task-btn.search {
            width: 210px;
            height: 38px;
            justify-content: flex-start;
            gap: 10px;
            padding: 0 14px;
            color: #f4f4f7;
            font-size: 15px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            border: 0;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .task-btn.search:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0.95;
        }

        .search-icon-img {
            width: 16px;
            height: 16px;
            object-fit: contain;
            filter: brightness(1.1);
        }

        .search-text { color: #f4f4f7; }

        .task-tray {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #f4f4f7;
            font-size: 13px;
        }

        .tray-chevron { opacity: 0.8; }

        .tray-lang,
        .tray-time {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .tray-lang .primary,
        .tray-time .primary { font-weight: 600; }

        .tray-lang .secondary,
        .tray-time .secondary { color: #dfe2eb; font-size: 12px; }

        .tray-icon { opacity: 0.9; font-size: 15px; }
        .tray-bell { font-size: 16px; opacity: 0.95; }

        .tray-icon-img,
        .tray-bell-img {
            width: 16px;
            height: 16px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.95;
        }

        .titlebar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: var(--panel-top);
            font-size: 13px;
            user-select: none;
        }

        .title-left {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .app-icon { width: 16px; height: 16px; }
        .title-text { color: #dfe6ee; font-weight: 600; }

        .title-controls {
            display: inline-flex;
            margin-left: auto;
            gap: 4px;
        }

        .title-controls button {
            all: unset;
            width: 30px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #dfe6ee;
            border-radius: 6px;
            cursor: pointer;
            transition: background 120ms ease, color 120ms ease;
        }

        .title-controls button:hover { background: #1f2932; }
        .title-controls button:active { background: #182029; }

        .title-controls .close:hover { background: #c42b1c; color: #ffffff; }
        .title-controls .close:active { background: #a12014; }

        .header-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 11px 12px;
            background: #202020;
            color: #dfe6ee;
        }

        .header-left { display: inline-flex; align-items: center; gap: 9px; }
        .burger { font-size: 20px; opacity: 0.9; }
        .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.2px; }
        .clock-icon { font-size: 18px; opacity: 0.9; }

        .display {
            padding: 16px 16px 12px;
            background: linear-gradient(180deg, #202020 0%, #202020 100%);
            min-height: 140px;
        }

        .history {
            text-align: right;
            color: #7d8793;
            font-size: 12px;
            min-height: 18px;
        }

        .result {
            text-align: right;
            font-size: 42px;
            font-weight: 400;
            line-height: 1.2;
            word-break: break-all;
            letter-spacing: 0.4px;
            color: #e9edf2;
        }

        .mode-row,
        .memory-row,
        .group-row { padding: 9px 12px; }

        .mode-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #c5ccd7;
            font-size: 13px;
        }

        .memory-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            color: #6f7b87;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        .group-row {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #dfe6ee;
            font-size: 13px;
        }

        .group-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: #202020;
            border: 0px solid var(--border);
            border-radius: 8px;
        }

        .btn-grid {
            display: grid;
            gap: 2px;
            padding: 12px 12px 14px;
            grid-template-columns: repeat(5, 1fr);
        }

        button {
            border: 0px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            font-family: var(--font);
            font-size: 15.5px;
            color: #e9edf2;
            background: var(--btn);
            padding: 10px 0;
            cursor: pointer;
            transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
        }

        button:hover { background: var(--btn-hover); }
        button:active { background: var(--btn-active); transform: translateY(1px); }

        button[data-digit],
        button[data-action="decimal"],
        button[data-action="negate"] {
            background: var(--btn-num);
            border-color: rgba(255,255,255,0.08);
        }

        button[data-digit]:hover,
        button[data-action="decimal"]:hover,
        button[data-action="negate"]:hover { background: var(--btn-num-hover); }

        button[data-digit]:active,
        button[data-action="decimal"]:active,
        button[data-action="negate"]:active { background: var(--btn-num-active); }

        .btn-operator { background: var(--btn-operator); }
        .btn-operator:hover { background: var(--btn-operator-hover); }

        .btn-accent {
            background: var(--accent);
            border-color: #1f7ed3;
            color: #ffffff;
        }

        .btn-accent:hover { background: var(--accent-hover); }

        .span-2-rows { grid-row: span 2; }

        button:focus-visible {
            outline: 2px solid rgba(59, 124, 255, 0.9);
            outline-offset: 2px;
        }

        @media (max-width: 480px) {
            .calculator { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="calculator" role="application" aria-label="Windows 11 style calculator">
        <div class="titlebar">
            <div class="title-left">
                <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/55/Windows_Calculator_icon.png" alt="Calculator icon">
                <div class="title-text">Calculator</div>
            </div>
            <div class="title-controls" aria-label="Window controls">
                <button class="min" aria-label="Minimize">&#x2212;</button>
                <button class="max" aria-label="Maximize">&#x25a1;</button>
                <button class="close" aria-label="Close">&#x2715;</button>
            </div>
        </div>

        <div class="header-row">
            <div class="header-left">
                <span class="burger">≡</span>
                <span class="header-title">Scientific</span>
            </div>
            <div></div>
            <div class="clock-icon">⟳</div>
        </div>

        <div class="display" aria-live="polite">
            <div class="history" id="history"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="mode-row">
            <span>DEG</span>
            <span>F-E</span>
        </div>

        <div class="memory-row">
            <span>MC</span>
            <span>MR</span>
            <span>M+</span>
            <span>M−</span>
            <span>MS</span>
            <span>Mv</span>
        </div>

        <div class="group-row">
            <span class="group-chip">∠ Trigonometry ▾</span>
            <span class="group-chip">ƒ Function ▾</span>
        </div>

        <div class="btn-grid" id="keys">
            <button data-action="second-toggle">2ⁿᵈ</button>
            <button data-action="pi">π</button>
            <button data-action="e-const">e</button>
            <button data-action="clear">C</button>
            <button data-action="backspace">⌫</button>

            <button data-action="square">x²</button>
            <button data-action="reciprocal">1/x</button>
            <button data-action="abs">|x|</button>
            <button data-action="exp">exp</button>
            <button class="btn-operator" data-operator="mod">mod</button>

            <button data-action="sqrt">²√x</button>
            <button class="btn-operator" data-operator="power">xʸ</button>
            <button class="btn-operator" data-operator="root">ʸ√x</button>
            <button data-action="factorial">n!</button>
            <button class="btn-operator" data-operator="/">÷</button>

            <button data-action="cube">x³</button>
            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>
            <button class="btn-operator" data-operator="*">×</button>

            <button data-action="inverse">x⁻¹</button>
            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>
            <button class="btn-operator" data-operator="-">−</button>

            <button data-action="pow10">10ˣ</button>
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>
            <button class="btn-operator" data-operator="+">+</button>

            <button data-action="ln">In</button>
            <button data-action="negate">±</button>
            <button data-digit="0">0</button>
            <button data-action="decimal">.</button>
            <button class="btn-accent" data-action="equals">=</button>
        </div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const historyEl = document.getElementById("history");
            const resultEl = document.getElementById("result");
            const keys = document.getElementById("keys");
            const timePrimary = document.querySelector(".tray-time .primary");
            const timeSecondary = document.querySelector(".tray-time .secondary");
            const calculatorEl = document.querySelector(".calculator");
            const titlebarEl = document.querySelector(".titlebar");
            const taskCalcBtn = document.querySelector(".task-btn.calc");
            const minimizeBtn = document.querySelector(".title-controls .min");

            if (taskCalcBtn) taskCalcBtn.classList.add("running");

            const dragState = { active: false, startX: 0, startY: 0, startLeft: 0, startTop: 0 };

            function setCalculatorVisible(show) {
                if (show) {
                    calculatorEl.classList.remove("hidden");
                    taskCalcBtn?.classList.add("active");
                } else {
                    calculatorEl.classList.add("hidden");
                    taskCalcBtn?.classList.remove("active");
                }
            }

            function ensurePositioned() {
                const prevTransition = calculatorEl.style.transition;
                calculatorEl.style.transition = "none";
                const rect = calculatorEl.getBoundingClientRect();
                calculatorEl.style.left = `${rect.left}px`;
                calculatorEl.style.top = `${rect.top}px`;
                calculatorEl.style.transform = "none";
                requestAnimationFrame(() => {
                    calculatorEl.style.transition = prevTransition;
                });
            }

            function beginDrag(e) {
                if (e.button !== 0) return;
                if (e.target.closest(".title-controls")) return;
                const transformValue = getComputedStyle(calculatorEl).transform;
                if (transformValue && transformValue !== "none") ensurePositioned();
                dragState.active = true;
                dragState.startX = e.clientX;
                dragState.startY = e.clientY;
                dragState.startLeft = parseFloat(calculatorEl.style.left);
                dragState.startTop = parseFloat(calculatorEl.style.top);
                titlebarEl.setPointerCapture(e.pointerId);
            }

            function handleDrag(e) {
                if (!dragState.active) return;
                const dx = e.clientX - dragState.startX;
                const dy = e.clientY - dragState.startY;
                const maxLeft = Math.max(0, window.innerWidth - calculatorEl.offsetWidth);
                const maxTop = Math.max(0, window.innerHeight - calculatorEl.offsetHeight);
                const nextLeft = Math.min(Math.max(0, dragState.startLeft + dx), maxLeft);
                const nextTop = Math.min(Math.max(0, dragState.startTop + dy), maxTop);
                calculatorEl.style.left = `${nextLeft}px`;
                calculatorEl.style.top = `${nextTop}px`;
            }

            function endDrag(e) {
                if (!dragState.active) return;
                dragState.active = false;
                if (titlebarEl.hasPointerCapture(e.pointerId)) {
                    titlebarEl.releasePointerCapture(e.pointerId);
                }
            }

            titlebarEl.addEventListener("pointerdown", beginDrag);
            titlebarEl.addEventListener("pointermove", handleDrag);
            titlebarEl.addEventListener("pointerup", endDrag);
            titlebarEl.addEventListener("pointercancel", endDrag);

            taskCalcBtn?.addEventListener("click", () => {
                const isHidden = calculatorEl.classList.contains("hidden");
                setCalculatorVisible(isHidden);
            });

            minimizeBtn?.addEventListener("click", () => {
                setCalculatorVisible(false);
            });

            setCalculatorVisible(true);

            const state = {
                display: "0",
                operand: null,
                operator: null,
                waitingForSecond: false,
                memory: null,
                history: ""
            };

            function renderOp(op) {
                if (op === "*") return "×";
                if (op === "/") return "÷";
                if (op === "mod") return "mod";
                if (op === "power") return "^";
                if (op === "root") return "root";
                return op;
            }

            function updateDisplay() {
                resultEl.textContent = state.display;
                historyEl.textContent = state.history;
            }

            function inputDigit(digit) {
                if (state.waitingForSecond) {
                    state.display = digit;
                    state.waitingForSecond = false;
                } else {
                    state.display = state.display === "0" ? digit : state.display + digit;
                }
                updateDisplay();
            }

            function inputDecimal() {
                if (state.waitingForSecond) {
                    state.display = "0.";
                    state.waitingForSecond = false;
                } else if (!state.display.includes(".")) {
                    state.display += ".";
                }
                updateDisplay();
            }

            function clearEntry() {
                state.display = "0";
                updateDisplay();
            }

            function clearAll() {
                state.display = "0";
                state.operand = null;
                state.operator = null;
                state.waitingForSecond = false;
                state.history = "";
                updateDisplay();
            }

            function backspace() {
                if (state.waitingForSecond) return;
                state.display = state.display.length > 1 ? state.display.slice(0, -1) : "0";
                updateDisplay();
            }

            function setOperator(op) {
                const current = parseFloat(state.display);
                if (state.operator && state.waitingForSecond) {
                    state.operator = op;
                    state.history = `${state.operand} ${renderOp(op)}`;
                    updateDisplay();
                    return;
                }
                if (state.operand === null) {
                    state.operand = current;
                } else if (state.operator) {
                    state.operand = compute(state.operand, current, state.operator);
                    state.display = String(state.operand);
                }
                state.operator = op;
                state.waitingForSecond = true;
                state.history = `${state.operand} ${renderOp(op)}`;
                updateDisplay();
            }

            function compute(a, b, op) {
                switch (op) {
                    case "+": return a + b;
                    case "-": return a - b;
                    case "*": return a * b;
                    case "/": return b === 0 ? NaN : a / b;
                    case "mod": return b === 0 ? NaN : a % b;
                    case "power": return Math.pow(a, b);
                    case "root": return b === 0 ? NaN : Math.pow(a, 1 / b);
                    default: return b;
                }
            }

            function handleEquals() {
                if (state.operator === null || state.waitingForSecond) return;
                const a = state.operand ?? 0;
                const b = parseFloat(state.display);
                const result = compute(a, b, state.operator);
                state.history = `${a} ${renderOp(state.operator)} ${b} =`;
                state.display = formatNumber(result);
                state.operand = result;
                state.operator = null;
                state.waitingForSecond = false;
                updateDisplay();
            }

            function unary(action) {
                const current = parseFloat(state.display);
                let result = current;
                switch (action) {
                    case "sqrt":
                        result = current < 0 ? NaN : Math.sqrt(current);
                        state.history = `√(${current})`;
                        break;
                    case "square":
                        result = current * current;
                        state.history = `sqr(${current})`;
                        break;
                    case "reciprocal":
                        result = current === 0 ? NaN : 1 / current;
                        state.history = `1/(${current})`;
                        break;
                    case "abs":
                        result = Math.abs(current);
                        state.history = `abs(${current})`;
                        break;
                    case "exp":
                        result = Math.exp(current);
                        state.history = `exp(${current})`;
                        break;
                    case "cube":
                        result = current * current * current;
                        state.history = `cube(${current})`;
                        break;
                    case "inverse":
                        result = current === 0 ? NaN : 1 / current;
                        state.history = `${current}⁻¹`;
                        break;
                    case "pow10":
                        result = Math.pow(10, current);
                        state.history = `10^(${current})`;
                        break;
                    case "ln":
                        result = current <= 0 ? NaN : Math.log(current);
                        state.history = `ln(${current})`;
                        break;
                    case "factorial": {
                        if (current < 0 || !Number.isInteger(current)) {
                            result = NaN;
                        } else {
                            let res = 1;
                            for (let i = 2; i <= current; i++) {
                                res *= i;
                                if (!Number.isFinite(res)) break;
                            }
                            result = res;
                        }
                        state.history = `${current}!`;
                        break;
                    }
                    default:
                        break;
                }
                state.display = formatNumber(result);
                state.waitingForSecond = false;
                updateDisplay();
            }

            function percent() {
                const current = parseFloat(state.display);
                if (state.operand !== null && state.operator) {
                    const value = (state.operand * current) / 100;
                    state.display = formatNumber(value);
                } else {
                    state.display = formatNumber(current / 100);
                }
                updateDisplay();
            }

            function negate() {
                if (state.display === "0") return;
                state.display = state.display.startsWith("-") ? state.display.slice(1) : "-" + state.display;
                updateDisplay();
            }

            function inputConstant(value, label) {
                state.display = formatNumber(value);
                state.history = label;
                state.waitingForSecond = false;
                updateDisplay();
            }

            let secondMode = false;
            function toggleSecond() {
                secondMode = !secondMode;
                // Visual toggle only for now
                const btn = document.querySelector("[data-action='second-toggle']");
                if (btn) btn.classList.toggle("active", secondMode);
            }

            function formatNumber(num) {
                if (!isFinite(num)) return "Cannot divide by zero";
                const str = String(num);
                return str.length > 14 ? Number(num.toPrecision(12)).toString() : str;
            }

            function memory(action) {
                const current = parseFloat(state.display);
                switch (action) {
                    case "memory-store":
                        state.memory = current;
                        break;
                    case "memory-add":
                        state.memory = (state.memory ?? 0) + current;
                        break;
                    case "memory-subtract":
                        state.memory = (state.memory ?? 0) - current;
                        break;
                    case "memory-clear":
                        state.memory = null;
                        break;
                    case "memory-recall":
                        if (state.memory !== null) {
                            state.display = formatNumber(state.memory);
                            state.waitingForSecond = false;
                        }
                        break;
                    default:
                        break;
                }
                updateDisplay();
            }

            keys.addEventListener("click", (e) => {
                const btn = e.target.closest("button");
                if (!btn) return;

                const digit = btn.dataset.digit;
                const operator = btn.dataset.operator;
                const action = btn.dataset.action;

                if (digit !== undefined) return inputDigit(digit);
                if (operator) return setOperator(operator);

                switch (action) {
                    case "decimal": return inputDecimal();
                    case "clear-entry": return clearEntry();
                    case "clear": return clearAll();
                    case "backspace": return backspace();
                    case "equals": return handleEquals();
                    case "sqrt": return unary("sqrt");
                    case "square": return unary("square");
                    case "reciprocal": return unary("reciprocal");
                    case "abs": return unary("abs");
                    case "exp": return unary("exp");
                    case "cube": return unary("cube");
                    case "inverse": return unary("inverse");
                    case "pow10": return unary("pow10");
                    case "ln": return unary("ln");
                    case "factorial": return unary("factorial");
                    case "pi": return inputConstant(Math.PI, "π");
                    case "e-const": return inputConstant(Math.E, "e");
                    case "percent": return percent();
                    case "negate": return negate();
                    case "second-toggle": return toggleSecond();
                    case "memory-clear":
                    case "memory-recall":
                    case "memory-add":
                    case "memory-subtract":
                    case "memory-store":
                        return memory(action);
                    default:
                        return;
                }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key >= "0" && e.key <= "9") return inputDigit(e.key);
                if (e.key === ".") return inputDecimal();
                if (["+", "-", "*", "/"].includes(e.key)) return setOperator(e.key);
                if (e.key === "Enter" || e.key === "=") return handleEquals();
                if (e.key === "Backspace") return backspace();
                if (e.key === "Escape") return clearAll();
            });

            updateDisplay();

            function pad2(n) { return n.toString().padStart(2, "0"); }

            function updateClock() {
                const now = new Date();
                let h = now.getHours();
                const m = pad2(now.getMinutes());
                const s = pad2(now.getSeconds());
                const ampm = h >= 12 ? "PM" : "AM";
                h = h % 12;
                if (h === 0) h = 12;
                if (timePrimary) timePrimary.textContent = `${h}:${m}:${s} ${ampm}`;
                const month = pad2(now.getMonth() + 1);
                const day = pad2(now.getDate());
                const year = now.getFullYear();
                if (timeSecondary) timeSecondary.textContent = `${month}/${day}/${year}`;
            }

            updateClock();
            setInterval(updateClock, 1000);
        });
    </script>

    <div class="taskbar" role="presentation" aria-label="Windows 11 taskbar">
        <div class="taskbar-left">
            <button class="task-btn start" aria-label="Start">
                <img class="start-img" src="win11.png" alt="Windows Start logo">
            </button>
            <button class="task-btn search" aria-label="Search">
                <span class="search-icon"><img class="search-icon-img" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Windows_search_icon.png" alt="Search"></span>
                <span class="search-text">Search</span>
            </button>
            <button class="task-btn" aria-label="Task View"><img class="start-img" src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Windows_11_Task_View_Icon.png" alt="Task View"></button>
            <button class="task-btn" aria-label="File Explorer"><img class="start-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/Windows_Explorer.svg/330px-Windows_Explorer.svg.png?20211004110527" alt="File Explorer"></button>
            <button class="task-btn" aria-label="Edge"><img class="start-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/Microsoft_Edge_logo_%282019%29.svg/960px-Microsoft_Edge_logo_%282019%29.svg.png" alt="Edge"></button>
            <button class="task-btn" aria-label="Store"><img class="start-img" src="https://upload.wikimedia.org/wikipedia/commons/0/04/Microsoft_Store_logo_dark.svg" alt="Store"></button>
            <button class="task-btn calc" aria-label="Calculator"><img class="start-img" src="https://upload.wikimedia.org/wikipedia/commons/5/55/Windows_Calculator_icon.png" alt="Calculator"></button>
        </div>
        <div class="taskbar-right">
            <div class="task-tray" aria-label="System tray">
                <span class="tray-chevron" aria-hidden="true">⌃</span>
                <div class="tray-lang" aria-label="Input language">
                    <span class="primary">ENG</span>
                    <span class="secondary">INTL</span>
                </div>
                <span class="tray-icon" aria-label="Display">
                    <img class="tray-icon-img" src="wifi.png" alt="Wi-Fi status">
                </span>
                <span class="tray-icon" aria-label="Volume">
                    <img class="tray-icon-img" src="sound.png" alt="Volume">
                </span>
                <div class="tray-time" aria-label="Date and time">
                    <span class="primary">11:44:31 PM</span>
                    <span class="secondary">11/02/2026</span>
                </div>
                <span class="tray-bell" aria-label="Notifications">
                    <img class="tray-bell-img" src="notification.png" alt="Notifications">
                </span>
            </div>
        </div>
    </div>
</body>
</html>
