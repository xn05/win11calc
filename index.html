<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/win11.png">
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <title>Windows 11 Calculator (HTML)</title>
</head>
<body>
    <div class="calculator" role="application" aria-label="Windows 11 style calculator">
        <div class="titlebar">
            <div class="title-left">
                <img class="app-icon" src="assets/Windows_Calculator_icon.png" alt="Calculator icon">
                <div class="title-text">Calculator</div>
            </div>
            <div class="title-controls" aria-label="Window controls">
                <button class="min" aria-label="Minimize">&#x2212;</button>
                <button class="max" aria-label="Maximize">&#x25a1;</button>
                <button class="close" aria-label="Close">&#x2715;</button>
            </div>
        </div>

        <div class="header-row">
            <div class="header-left">
                <span class="burger">≡</span>
                <span class="header-title">Scientific</span>
            </div>
            <div></div>
            <div class="clock-icon">⟳</div>
        </div>

        <div class="display" aria-live="polite">
            <div class="history" id="history"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="mode-row">
            <span>DEG</span>
            <span>F-E</span>
        </div>

        <div class="memory-row">
            <span>MC</span>
            <span>MR</span>
            <span>M+</span>
            <span>M−</span>
            <span>MS</span>
            <span>Mv</span>
        </div>

        <div class="group-row">
            <span class="group-chip">∠ Trigonometry ▾</span>
            <span class="group-chip">ƒ Function ▾</span>
        </div>

        <div class="btn-grid" id="keys">
            <button data-action="second-toggle">2ⁿᵈ</button>
            <button data-action="pi">π</button>
            <button data-action="e-const">e</button>
            <button data-action="clear">C</button>
            <button data-action="backspace">⌫</button>

            <button data-action="square">x²</button>
            <button data-action="reciprocal">1/x</button>
            <button data-action="abs">|x|</button>
            <button data-action="exp">exp</button>
            <button class="btn-operator" data-operator="mod">mod</button>

            <button data-action="sqrt">²√x</button>
            <button class="btn-operator" data-operator="power">xʸ</button>
            <button class="btn-operator" data-operator="root">ʸ√x</button>
            <button data-action="factorial">n!</button>
            <button class="btn-operator" data-operator="/">÷</button>

            <button data-action="cube">x³</button>
            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>
            <button class="btn-operator" data-operator="*">×</button>

            <button data-action="inverse">x⁻¹</button>
            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>
            <button class="btn-operator" data-operator="-">−</button>

            <button data-action="pow10">10ˣ</button>
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>
            <button class="btn-operator" data-operator="+">+</button>

            <button data-action="ln">In</button>
            <button data-action="negate">±</button>
            <button data-digit="0">0</button>
            <button data-action="decimal">.</button>
            <button class="btn-accent" data-action="equals">=</button>
        </div>
    </div>

    <div class="taskbar" role="presentation" aria-label="Windows 11 taskbar">
        <div class="taskbar-left">
            <button class="task-btn start" aria-label="Start">
                <img class="start-img" src="assets/win11.png" alt="Windows Start logo">
            </button>
            <button class="task-btn search" aria-label="Search">
                <span class="search-icon"><img class="search-icon-img" src="assets/Windows_search_icon.png" alt="Search"></span>
                <span class="search-text">Search</span>
            </button>
            <button class="task-btn" aria-label="Task View"><img class="start-img" src="assets/Windows_11_Task_View_Icon.png" alt="Task View"></button>
            <button class="task-btn" aria-label="File Explorer"><img class="start-img" src="assets/Windows_Explorer.svg.png" alt="File Explorer"></button>
            <button class="task-btn" aria-label="Edge"><img class="start-img" src="assets/Microsoft_Edge_logo_(2019).svg.png" alt="Edge"></button>
            <button class="task-btn" aria-label="Store"><img class="start-img" src="assets/Microsoft_Store_logo_dark.svg" alt="Store"></button>
            <button class="task-btn calc" aria-label="Calculator"><img class="start-img" src="assets/Windows_Calculator_icon.png" alt="Calculator"></button>
        </div>
        <div class="taskbar-right">
            <div class="task-tray" aria-label="System tray">
                <span class="tray-chevron" aria-hidden="true">⌃</span>
                <div class="tray-lang" aria-label="Input language">
                    <span class="primary">ENG</span>
                    <span class="secondary">INTL</span>
                </div>
                <span class="tray-icon" aria-label="Display">
                    <img class="tray-icon-img" src="assets/wifi.png" alt="Wi-Fi status">
                </span>
                <span class="tray-icon" aria-label="Volume">
                    <img class="tray-icon-img" src="assets/sound.png" alt="Volume">
                </span>
                <div class="tray-time" aria-label="Date and time">
                    <span class="primary">11:44:31 PM</span>
                    <span class="secondary">11/02/2026</span>
                </div>
                <span class="tray-bell" aria-label="Notifications">
                    <img class="tray-bell-img" src="assets/notification.png" alt="Notifications">
                </span>
            </div>
        </div>
    </div>
</body>
</html>
